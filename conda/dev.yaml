name: hiperhealth
channels:
  - conda-forge
  - defaults

dependencies:
  - python >=3.10,<=3.13
  - pip
  - nodejs # used by semantic-release
  - tesseract
  - libmagic
  - uv
  - gcc_linux-64 # required to compile C extensions for pre-commit hooks
  - gxx_linux-64 # required to compile C++ extensions
  - pip:
      - paginate==0.5.6 # distlib issue
