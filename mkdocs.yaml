site_name: HiPerHealth
site_url: https://hiperhealth.com
site_description: A Python library for clinical AI workflows with skill-based pipelines
repo_url: https://github.com/hiperhealth/hiperhealth
repo_name: hiperhealth/hiperhealth
docs_dir: ./docs/
site_dir: ./build/

extra_css:
  - stylesheets/extra.css

# --------------------------------------------------------------------------- #
# Navigation
# --------------------------------------------------------------------------- #
nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - LLM Configuration: llm_configuration.md
      - Usage: usage.md
  - Example: example.md
  - Guides:
      - Creating Skills: skills.md
      - Informed Consent: informed_consent.md
  - Reference:
      # from gen-files
      - API: api/
      - Changelog: changelog.md
  - Community:
      - Contributing: contributing.md
  # - Notebook: example.ipynb

# --------------------------------------------------------------------------- #
# Theme
# --------------------------------------------------------------------------- #
theme:
  name: material
  logo: images/logo.png
  favicon: images/favicon.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: Roboto Mono
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - header.autohide
    - navigation.expand
    - navigation.indexes
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

# --------------------------------------------------------------------------- #
# Plugins
# --------------------------------------------------------------------------- #
plugins:
  - search
  - macros
  - autorefs
  - gen-files:
      scripts:
        - scripts/gen_ref_nav.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      enable_inventory: true
      handlers:
        python:
          paths: [./src]
          import:
            - https://docs.python.org/3/objects.inv
          options:
            docstring_options:
              ignore_init_summary: true
            docstring_section_style: list
            docstring_style: numpy
            filters: ["!^_"]
            heading_level: 1
            inherited_members: true
            merge_init_into_class: true
            separate_signature: true
            show_root_full_path: false
            show_root_heading: true
            show_signature_annotations: true
            show_source: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            signature_crossrefs: true
            summary: true
  # - mkdocs-jupyter:
  #     execute: false
  #     ignore:
  #       - "*.py"
  #     include_source: true
  #     theme: dark

# --------------------------------------------------------------------------- #
# Markdown extensions
# --------------------------------------------------------------------------- #
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite:
      style_plain_text: python
  - pymdownx.magiclink:
      provider: github
      repo_url_shortener: true
  - pymdownx.saneheaders
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

# --------------------------------------------------------------------------- #
# Extra
# --------------------------------------------------------------------------- #
extra:
  project_name: "hiperhealth"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hiperhealth/hiperhealth
      name: HiPerHealth on GitHub
  generator: false

copyright: "Copyright &copy; 2022 – 2026, HiPerHealth Team"
